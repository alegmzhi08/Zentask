<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel World</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#000;cursor:none;image-rendering:pixelated;}
#c{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}
#ui{position:fixed;top:12px;right:12px;display:flex;flex-direction:column;align-items:flex-end;gap:6px;pointer-events:none;z-index:10;}
.panel{background:rgba(62,39,17,0.92);border:3px solid #c8a45a;border-radius:4px;padding:6px 10px;color:#ffe4a0;font-size:13px;box-shadow:2px 2px 0 #000;}
#clk{display:flex;align-items:center;gap:8px;padding:8px 12px;}
#sun{font-size:20px;}
#tt{font-size:15px;font-weight:bold;letter-spacing:1px;}
#dt{font-size:11px;color:#c8a45a;}
#hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(62,39,17,0.88);border:2px solid #c8a45a;border-radius:4px;color:#ffe4a0;font-size:11px;padding:5px 14px;pointer-events:none;z-index:10;white-space:nowrap;font-family:'Courier New',monospace;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="panel" id="clk"><span id="sun">☀️</span><div><div id="tt">6:00 am</div><div id="dt">Lun. 1 — Primavera</div></div></div>
  <div class="panel" id="sp">Velocidad: 1x &nbsp;[+/-]</div>
  <div class="panel" id="score-panel">
    <span class="diamond">💎</span>
    <span class="pts" id="score-pts">0</span>
    <span style="font-size:11px;color:#5a6280;">diamantes</span>
  </div>
</div>
<div id="hint">↑↓←→ · WASD mover lobo · +/- velocidad tiempo</div>

<style>
/* ── EVENT PANEL ───────────────────────────────── */
#evt-panel {
  display: none;
  position: fixed;
  z-index: 100;
  min-width: 300px;
  background: #0f1117;
  border: 2px solid #3a3f55;
  border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 0 1px #1e2235;
  font-family: 'Courier New', monospace;
  color: #c8d0e8;
  padding: 0;
  overflow: hidden;
  user-select: none;
}

#evt-header {
  background: #181c2e;
  padding: 12px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #2a2f45;
  cursor: move;
}
#evt-header span {
  font-size: 13px;
  font-weight: bold;
  color: #8b9fd4;
  letter-spacing: 1px;
  text-transform: uppercase;
}
#evt-close {
  background: none;
  border: none;
  color: #556;
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
  padding: 0 2px;
  transition: color .15s;
}
#evt-close:hover { color: #e06060; }
#evt-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.evt-field label {
  display: block;
  font-size: 10px;
  color: #5a6280;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.evt-field input,
.evt-field textarea {
  width: 100%;
  background: #181c2e;
  border: 1px solid #2a2f45;
  border-radius: 6px;
  color: #c8d0e8;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  padding: 8px 10px;
  box-sizing: border-box;
  outline: none;
  transition: border-color .15s;
}
.evt-field input:focus,
.evt-field textarea:focus { border-color: #5060c0; }
.evt-field textarea { resize: vertical; min-height: 70px; }
.evt-row { display: flex; gap: 10px; }
.evt-row .evt-field { flex: 1; }

/* Color picker */
#evt-colors label {
  display: block;
  font-size: 10px;
  color: #5a6280;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
#evt-color-swatches {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.swatch {
  width: 24px; height: 24px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform .12s, border-color .12s;
  box-sizing: border-box;
}
.swatch:hover { transform: scale(1.2); }
.swatch.active { border-color: #fff; transform: scale(1.15); }

#evt-footer {
  padding: 12px 16px;
  border-top: 1px solid #2a2f45;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
#evt-cancel {
  background: none;
  border: 1px solid #2a2f45;
  border-radius: 6px;
  color: #5a6280;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  padding: 7px 16px;
  cursor: pointer;
  transition: border-color .15s, color .15s;
}
#evt-cancel:hover { border-color: #556; color: #c8d0e8; }
#evt-save {
  background: #2a3580;
  border: 1px solid #4050c0;
  border-radius: 6px;
  color: #c8d0ff;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  font-weight: bold;
  padding: 7px 20px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background .15s;
}
#evt-save:hover { background: #3545a0; }

/* View event popup */
#evt-view {
  display: none;
  position: fixed;
  z-index: 100;
  min-width: 260px;
  background: #0f1117;
  border: 2px solid #3a3f55;
  border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7);
  font-family: 'Courier New', monospace;
  color: #c8d0e8;
  padding: 16px;
  user-select: none;
}

#evt-view-title {
  font-size: 14px;
  font-weight: bold;
  color: #8b9fd4;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
#evt-view-close {
  background: none; border: none; color: #556; font-size: 18px; cursor: pointer; padding: 0;
}
#evt-view-close:hover { color: #e06060; }
.evt-view-row { font-size: 12px; margin-bottom: 6px; color: #8898c0; }
.evt-view-row span { color: #c8d0e8; }
#evt-view-desc { font-size: 12px; color: #a0aac8; margin-top: 8px; line-height: 1.5; border-top: 1px solid #2a2f45; padding-top: 8px; }
#evt-view-done {
  background: none;
  border: 1px solid #204030;
  border-radius: 6px;
  color: #40a060;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  padding: 5px 12px;
  cursor: pointer;
  transition: background .15s, color .15s;
  flex:1;
}
#evt-view-done:hover { background: #102820; color: #60e090; }
#evt-view-delete {
  background: none;
  border: 1px solid #3a2030;
  border-radius: 6px;
  color: #804050;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  padding: 5px 12px;
  cursor: pointer;
  transition: background .15s, color .15s;
}
#evt-view-delete:hover { background: #3a1020; color: #e06070; }
/* Score panel */
#score-panel {
  display:flex;
  align-items:center;
  gap:6px;
  padding: 7px 12px;
  font-size: 14px;
  letter-spacing: 1px;
  color: #a8d8ff;
}
#score-panel .diamond { font-size:16px; }
#score-panel .pts { font-weight:bold; color:#60d0ff; font-size:15px; }
/* Flash animation for score gain */
@keyframes scoreFlash {
  0%   { transform:scale(1.4); color:#ffffff; }
  100% { transform:scale(1);   color:#60d0ff; }
}
.score-flash { animation: scoreFlash 0.5s ease-out; }
</style>

<!-- Event create panel -->
<div id="evt-panel">
  <div id="evt-header">
    <span>📌 Nuevo Evento</span>
    <button id="evt-close">✕</button>
  </div>
  <div id="evt-body">
    <div class="evt-field">
      <label>Descripción</label>
      <textarea id="evt-desc" placeholder="¿Qué pasa aquí?"></textarea>
    </div>
    <div class="evt-row">
      <div class="evt-field">
        <label>Fecha</label>
        <input type="date" id="evt-date">
      </div>
      <div class="evt-field">
        <label>Hora</label>
        <input type="time" id="evt-time">
      </div>
    </div>
    <div id="evt-colors">
      <label>Color de bandera</label>
      <div id="evt-color-swatches"></div>
    </div>
  </div>
  <div id="evt-footer">
    <button id="evt-cancel">Cancelar</button>
    <button id="evt-save">Guardar evento</button>
  </div>
</div>

<!-- Event view popup -->
<div id="evt-view">
  <div id="evt-view-title">
    <span id="evt-view-name">Evento</span>
    <button id="evt-view-close">✕</button>
  </div>
  <div class="evt-view-row">📅 Fecha: <span id="evt-view-date"></span></div>
  <div class="evt-view-row">🕐 Hora: <span id="evt-view-time"></span></div>
  <div id="evt-view-desc"></div>
  <div style="display:flex;gap:8px;margin-top:12px;">
    <button id="evt-view-done">✅ ¡Hecho! +15💎</button>
    <button id="evt-view-delete">🗑 Eliminar</button>
  </div>
</div>

function preload(urls){return urls.map(u=>{const i=new Image();i.src=u;return i;});}
const WF={west:preload(RAW.west),east:preload(RAW.east),south:preload(RAW.south),north:preload(RAW.north),idle:preload(RAW.idle)};

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

const T=32,COLS=80,ROWS=60,mapW=COLS*T,mapH=ROWS*T;
let camX=0,camY=0,mouseX=canvas.width/2,mouseY=canvas.height/2;

let gTime=0.25,tSpeed=1;
const DAY=60;
const DAYS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const SEAS=['Primavera','Verano','Otoño','Invierno'];
let dayN=1,seasN=0,prevT=0.25;

const TL={GR:0,GR3:2,DT:3,WA:5,SA:7,DW:8,PA:9,FL:10};

function n2(x,y,s=0){const n=Math.sin(x*127.1+y*311.7+s*74.3)*43758.5453;return n-Math.floor(n);}
function sm(x,y,sc,s){const xi=x/sc,yi=y/sc,x0=~~xi,y0=~~yi,dx=xi-x0,dy=yi-y0;const a=n2(x0,y0,s),b=n2(x0+1,y0,s),c=n2(x0,y0+1,s),d=n2(x0+1,y0+1,s);const fx=dx*dx*(3-2*dx),fy=dy*dy*(3-2*dy);return a+(b-a)*fx+(c-a)*fy+(a-b-c+d)*fx*fy;}
function fbm(x,y,sc,s){return sm(x,y,sc,s)*.5+sm(x,y,sc*.5,s+1)*.3+sm(x,y,sc*.25,s+2)*.2;}

const tMap=[],tVar=[];
for(let r=0;r<ROWS;r++){tMap[r]=[];tVar[r]=[];for(let c=0;c<COLS;c++){const h=fbm(c,r,14,42),m=fbm(c,r,8,99);let t=TL.GR;if(h<.30)t=TL.DW;else if(h<.36)t=TL.WA;else if(h<.40)t=TL.SA;else if(h<.42)t=TL.DT;else if(m>.72)t=TL.FL;else if(m>.68)t=TL.GR3;tMap[r][c]=t;tVar[r][c]=~~(n2(c,r,7)*4);}}
for(let i=0;i<6;i++){const r0=10+~~(n2(i,0,5)*40),c0=10+~~(n2(0,i,6)*60),len=8+~~(n2(i,i,9)*10),dr=n2(i,i,3)>.5?1:0,dc=dr?0:1;for(let s=0;s<len;s++){const rr=r0+s*dr,cc=c0+s*dc;if(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS)tMap[rr][cc]=TL.PA;}}

const objs=[];
for(let r=1;r<ROWS-1;r++)for(let c=1;c<COLS-1;c++){const t=tMap[r][c];if(t===TL.GR||t===TL.GR3||t===TL.FL){const v=n2(c*3.1,r*2.7,13);if(v<.06)objs.push({tp:'pine',r,c,sz:.9+n2(c,r,1)*.4,sw:n2(c,r,2)*Math.PI*2});else if(v<.11)objs.push({tp:'oak',r,c,sz:.8+n2(c,r,3)*.5,sw:n2(c,r,4)*Math.PI*2});else if(v<.13)objs.push({tp:'bush',r,c,sz:.7+n2(c,r,5)*.3});else if(v<.135)objs.push({tp:'stump',r,c});else if(v<.138)objs.push({tp:'log',r,c});else if(v<.15)objs.push({tp:'rock',r,c,sz:.5+n2(c,r,6)*.5});}if(t===TL.DT||t===TL.SA){if(n2(c*5,r*5,8)<.05)objs.push({tp:'rock',r,c,sz:.4+n2(c,r,9)*.3});}}
objs.sort((a,b)=>a.r===b.r?a.c-b.c:a.r-b.r);

const parts=[];
for(let i=0;i<55;i++)parts.push({tp:'fly',x:Math.random()*mapW,y:Math.random()*mapH,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,ph:Math.random()*Math.PI*2});
for(let i=0;i<7;i++)parts.push({tp:'bird',x:Math.random()*mapW,y:Math.random()*mapH*.4,vx:.4+Math.random()*.6,ph:Math.random()*Math.PI*2,sz:2+Math.random()*2});

let wFrame=0,wind=0;

function dayCol(t){
  const s=[{t:0,sky:[10,10,35],o:[0,0,60,.72]},{t:.17,sky:[20,15,50],o:[0,0,50,.62]},{t:.22,sky:[80,50,80],o:[60,20,80,.35]},{t:.28,sky:[255,160,60],o:[200,80,20,.12]},{t:.35,sky:[135,190,255],o:[0,0,0,0]},{t:.5,sky:[170,210,255],o:[0,0,0,0]},{t:.65,sky:[135,190,255],o:[0,0,0,0]},{t:.75,sky:[255,160,80],o:[200,80,20,.1]},{t:.8,sky:[180,80,120],o:[80,20,60,.25]},{t:.87,sky:[40,30,80],o:[0,0,50,.5]},{t:1,sky:[10,10,35],o:[0,0,60,.72]}];
  let a=s[0],b=s[s.length-1];
  for(let i=0;i<s.length-1;i++){if(t>=s[i].t&&t<=s[i+1].t){a=s[i];b=s[i+1];break;}}
  const f=a.t===b.t?0:(t-a.t)/(b.t-a.t),e=f*f*(3-2*f);
  return{sky:a.sky.map((v,i)=>~~(v+(b.sky[i]-v)*e)),o:[a.o[0]+(b.o[0]-a.o[0])*e,a.o[1]+(b.o[1]-a.o[1])*e,a.o[2]+(b.o[2]-a.o[2])*e,a.o[3]+(b.o[3]-a.o[3])*e]};
}

const GC=['#5dc44b','#63cc50','#58b845','#6ed458'],DC=['#c8884a','#be7c3e','#d4924e'],SC=['#e8c96a','#dfc060','#f0d270'],WC=['#3ab4e8','#2aaae0','#44bced'],DWC=['#1a7ab8','#1570aa','#2080c0'],PC=['#d4a868','#c89a5a','#dbb070'];
function tCol(t,v,wf){switch(t){case TL.GR:case TL.GR3:case TL.FL:return GC[v%4];case TL.DT:return DC[v%3];case TL.SA:return SC[v%3];case TL.PA:return PC[v%3];case TL.WA:return wf?WC[(v+1)%3]:WC[v%3];case TL.DW:return wf?DWC[(v+1)%3]:DWC[v%3];default:return'#5dc44b';}}

function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(~~x,~~y,w,h);}
function drawPine(x,y,sz,sw,t,na){const s=Math.sin(t*.8+sw)*2*sz,h1=~~(28*sz),h2=~~(20*sz),h3=~~(14*sz),dk=na>.3;px(x-2+s*.3,y+h1*.6,4,~~(h1*.45),dk?'#2a1a0a':'#5a3010');[{w:~~(18*sz),h:h3,yo:0,c:dk?'#1a4a22':'#2a6a32'},{w:~~(22*sz),h:h2,yo:~~(h3*.6),c:dk?'#153a1a':'#1e5226'},{w:~~(26*sz),h:h1,yo:~~((h3+h2)*.55),c:dk?'#0e2a10':'#164018'}].forEach((l,i)=>{const lx=x-l.w/2+s*(.5-i*.15),ly=y-l.h*.7+l.yo;ctx.fillStyle=l.c;ctx.beginPath();ctx.moveTo(~~(lx+l.w/2),~~ly);ctx.lineTo(~~(lx+l.w),~~(ly+l.h));ctx.lineTo(~~lx,~~(ly+l.h));ctx.closePath();ctx.fill();});}
function drawOak(x,y,sz,sw,t,na){const s=Math.sin(t*.6+sw)*3*sz,r=~~(14*sz),dk=na>.3;px(x-3+s*.2,y,6,~~(r*.9),dk?'#2a1a0a':'#6a4020');[{ox:0,oy:-r*.7,r,c:dk?'#1a5020':'#3a8030'},{ox:-r*.5,oy:-r*.3,r:r*.75,c:dk?'#143a18':'#2e6826'},{ox:r*.5,oy:-r*.35,r:r*.75,c:dk?'#0e2a10':'#224e1a'},{ox:0,oy:-r*.15,r:r*.8,c:dk?'#143a18':'#2e6826'},{ox:-r*.2,oy:-r,r:r*.6,c:dk?'#1a5020':'#3a8030'}].forEach(b=>{ctx.fillStyle=b.c;ctx.beginPath();ctx.arc(~~(x+b.ox+s),~~(y+b.oy),~~b.r,0,Math.PI*2);ctx.fill();});}
function drawBush(x,y,sz,na){const dk=na>.3,c1=dk?'#1a4a20':'#3a8030',c2=dk?'#122e16':'#2a6020';ctx.fillStyle=c1;ctx.beginPath();ctx.ellipse(~~x,~~y,~~(10*sz),~~(7*sz),0,0,Math.PI*2);ctx.fill();[[-6*sz,1],[6*sz,1]].forEach(([ox,oy])=>{ctx.fillStyle=c2;ctx.beginPath();ctx.ellipse(~~(x+ox),~~(y+oy),~~(7*sz),~~(5*sz),0,0,Math.PI*2);ctx.fill();});}
function drawRock(x,y,sz){const s=~~(9*sz);px(x-s/2,y-s*.6,s,s*.7,'#888');px(x-s/2+1,y-s*.6+1,s-3,2,'#aaa');px(x-s/2,y-2,s,4,'#666');}
function drawStump(x,y){px(x-5,y-4,10,8,'#7a5030');px(x-4,y-5,8,3,'#9a6840');}
function drawLog(x,y){px(x-10,y-3,20,6,'#8a5828');px(x-10,y-3,20,2,'#aa7040');px(x-12,y-3,4,6,'#6a4018');px(x+8,y-3,4,6,'#6a4018');}
function drawWater(wx,wy,t){ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(~~(wx+T/2),~~(wy+T/2+Math.sin((t*.5+wx*.03+wy*.05)%(Math.PI*2))*3),8,3,0,0,Math.PI*2);ctx.stroke();}
function drawGrass(gx,gy,v,t){const sw=Math.sin(t*.7+gx*.05)*1.5;ctx.strokeStyle='rgba(120,210,60,0.4)';ctx.lineWidth=1;for(let i=0;i<3;i++){const bx=gx+4+i*8+v*3;ctx.beginPath();ctx.moveTo(~~bx,~~(gy+T-4));ctx.lineTo(~~(bx+sw),~~(gy+T-10));ctx.stroke();}}
const FC=['#ff6688','#ffee44','#ff9933','#aa88ff','#44ddff','#ff44aa'];
function drawFlowers(gx,gy,v,t){const b=Math.sin(t*1.2+gx*.08);for(let i=0;i<3;i++){const fx=gx+5+i*9+v*2,fy=gy+T-8+b,c=FC[(v+i)%6];px(fx,fy,3,3,'#88cc44');px(fx-1,fy-2,2,2,c);px(fx+1,fy-2,2,2,c);px(fx,fy-3,2,2,c);}}

// ── WOLF ────────────────────────────────────────────────────
// Sprite: 68x68px. Scale pequeño para que quede bajo los árboles.
// Los árboles miden ~28*sz tiles = 28*0.9 = ~25px de copa en pantalla
// con T=32 el árbol ocupa ~2 tiles de alto visualmente.
// Queremos al lobo ~1 tile de alto = 32px → scale = 32/68 ≈ 0.47
// Un poco más generoso: 0.55 → 68*0.55 = ~37px. Bien proporcional.
const SCALE = 0.7;   // escala del sprite
const SPW = 68 * SCALE;  // ~48px ancho
const SPH = 68 * SCALE;  // ~48px alto

const wolf={
  x:25*T+T/2, y:25*T+T,
  speed:90,
  dir:'south',   // 'north'|'south'|'east'|'west'
  moving:false,
  frameIdx:0,
  frameTimer:0,
  bobPhase:0,
};

function getAnim(){
  if(!wolf.moving) return WF.idle;
  return WF[wolf.dir];
}

function drawWolf(){
  const anim=getAnim();
  const frame=anim[wolf.frameIdx%anim.length];
  if(!frame||!frame.complete)return;
  const sx=~~(wolf.x-camX);
  // Ancla en pies: sy es la posición Y del suelo del lobo
  // Dibujamos desde sy-SPH hasta sy (los pies tocan el suelo)
  const sy=~~(wolf.y-camY);
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(frame, ~~(sx-SPW/2), sy-SPH, SPW, SPH);
}

// ── INPUT ───────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='+'||e.key==='='){tSpeed=Math.min(tSpeed*2,16);document.getElementById('sp').textContent=`Velocidad: ${tSpeed}x   [+/-]`;}
  if(e.key==='-'){tSpeed=Math.max(tSpeed/2,.25);document.getElementById('sp').textContent=`Velocidad: ${tSpeed}x   [+/-]`;}
  if(e.key==='z'||e.key==='Z'){ targetZoom=Math.min(ZOOM_MAX, targetZoom+ZOOM_STEP); snapCamToWolf(); }
  if(e.key==='x'||e.key==='X'){ targetZoom=Math.max(ZOOM_MIN, targetZoom-ZOOM_STEP); snapCamToWolf(); }
  // Only preventDefault for arrow keys when panel is NOT focused
if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
if(e.key===' ' && document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'INPUT') e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.key]=false);
canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});

function walkable(wx,wy){const c=~~(wx/T),r=~~(wy/T);if(c<0||c>=COLS||r<0||r>=ROWS)return false;const t=tMap[r][c];return t!==TL.WA&&t!==TL.DW;}

function updateWolf(dt){
  // Block movement when user is typing
  const tag = document.activeElement ? document.activeElement.tagName : '';
  const typing = (tag === 'TEXTAREA' || tag === 'INPUT');
  let dx=0,dy=0;
  if(!typing){
    if(keys['ArrowLeft'] ||keys['a']||keys['A'])dx=-1;
    if(keys['ArrowRight']||keys['d']||keys['D'])dx=1;
    if(keys['ArrowUp']   ||keys['w']||keys['W'])dy=-1;
    if(keys['ArrowDown'] ||keys['s']||keys['S'])dy=1;
  }
  if(dx&&dy){dx*=.707;dy*=.707;}
  wolf.moving=!!(dx||dy);

  // Dirección: diagonal prioriza horizontal para las animaciones E/W
  if(dy<0&&!dx) wolf.dir='north';
  else if(dy>0&&!dx) wolf.dir='south';
  else if(dx<0) wolf.dir='west';
  else if(dx>0) wolf.dir='east';

  if(wolf.moving){
    const nx=wolf.x+dx*wolf.speed*dt;
    const ny=wolf.y+dy*wolf.speed*dt;
    // Punto de colisión: centro inferior del sprite
    if(walkable(nx, wolf.y+4)) wolf.x=nx;
    if(walkable(wolf.x, ny+4)) wolf.y=ny;
    wolf.x=Math.max(T,Math.min(mapW-T,wolf.x));
    wolf.y=Math.max(T,Math.min(mapH-T,wolf.y));
  }

  // Frame avance
  wolf.frameTimer+=dt*1000;
  const dur=wolf.moving?130:220;
  if(wolf.frameTimer>=dur){
    wolf.frameTimer=0;
    const anim=getAnim();
    wolf.frameIdx=(wolf.frameIdx+1)%anim.length;
  }
}

// ── ZOOM ────────────────────────────────────────────────────
let zoom = 1.0;
let targetZoom = 1.0;
const ZOOM_MIN = 0.4, ZOOM_MAX = 3.0, ZOOM_STEP = 0.15;

// Indicador de zoom en UI (wheel listener se añade después de que snapCamToWolf esté definido)
const zoomEl = document.createElement('div');
zoomEl.className = 'panel';
zoomEl.id = 'zm';
zoomEl.style.fontSize = '11px';
zoomEl.style.color = '#c8a45a';
zoomEl.textContent = 'Zoom: 100%  [Z/X · rueda]';
document.getElementById('ui').appendChild(zoomEl);

// snapCamToWolf: aplica zoom inmediato y centra cámara en el lobo sin lerp
function snapCamToWolf() {
  zoom = targetZoom;
  const vw = canvas.width  / zoom;
  const vh = canvas.height / zoom;
  camX = Math.max(0, Math.min(mapW - vw, wolf.x - vw / 2));
  camY = Math.max(0, Math.min(mapH - vh, wolf.y - vh / 2));
  document.getElementById('zm').textContent = `Zoom: ${Math.round(zoom*100)}%  [Z/X · rueda]`;
}

// Registrar wheel AQUÍ, después de que snapCamToWolf esté definido
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  targetZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, targetZoom - Math.sign(e.deltaY) * ZOOM_STEP));
  snapCamToWolf();
}, { passive: false });

function updateCam(){
  // Lerp suave del zoom
  zoom += (targetZoom - zoom) * 0.12;

  // Viewport en coords de mundo
  const vw = canvas.width  / zoom;
  const vh = canvas.height / zoom;

  // Sigue al lobo con lerp, sin parallax (causa el drift)
  const tx = wolf.x - vw / 2;
  const ty = wolf.y - vh / 2;
  camX += (tx - camX) * 0.12;
  camY += (ty - camY) * 0.12;
  camX = Math.max(0, Math.min(mapW - vw, camX));
  camY = Math.max(0, Math.min(mapH - vh, camY));

  document.getElementById('zm').textContent = `Zoom: ${Math.round(zoom*100)}%  [Z/X · rueda]`;
}

// ── RENDER ──────────────────────────────────────────────────
let lastT2=0;
function render(ts){
  const dt=Math.min(ts-lastT2,50)/1000;
  lastT2=ts;
  gTime=(gTime+dt*tSpeed/DAY)%1;
  wind+=dt*.4;wFrame=~~(ts/600)%2;
  updateWolf(dt);updateCam();

  const dc=dayCol(gTime),na=dc.o[3];
  ctx.fillStyle=`rgb(${dc.sky[0]},${dc.sky[1]},${dc.sky[2]})`;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Aplica zoom: escala desde origen, la cámara ya trabaja en coords de mundo/zoom
  ctx.save();
  ctx.scale(zoom, zoom);

  const sC=Math.max(0,~~(camX/T)),eC=Math.min(COLS-1,~~((camX+canvas.width/zoom)/T)+1);
  const sR=Math.max(0,~~(camY/T)),eR=Math.min(ROWS-1,~~((camY+canvas.height/zoom)/T)+1);

  // Tiles
  for(let r=sR;r<=eR;r++)for(let c=sC;c<=eC;c++){
    const t=tMap[r][c],v=tVar[r][c],sx=c*T-camX,sy=r*T-camY;
    px(sx,sy,T,T,tCol(t,v,wFrame));
    if(t===TL.WA||t===TL.DW)drawWater(sx,sy,ts/1000);
    else if(t===TL.GR||t===TL.GR3)drawGrass(sx,sy,v,wind);
    else if(t===TL.FL){drawGrass(sx,sy,v,wind);drawFlowers(sx,sy,v,wind);}
    else if(t===TL.PA){px(sx+2,sy+2,T-4,T-4,PC[(v+1)%3]);px(sx+3,sy+3,T-6,T-6,PC[v%3]);}
  }

  // Objetos + lobo en orden Y (painter's algorithm)
  const time=ts/1000;
  const wRow=wolf.y/T;   // fila del lobo en tiles
  let wDrawn=false;

  for(const obj of objs){
    if(obj.r<sR-3||obj.r>eR+3||obj.c<sC-3||obj.c>eC+3)continue;
    // Insertar lobo antes del primer objeto que esté más al sur
    if(!wDrawn&&obj.r>=wRow){wDrawn=true;drawWolf();}
    const ox=obj.c*T+T/2-camX,oy=obj.r*T+T-camY;
    switch(obj.tp){
      case'pine':drawPine(ox,oy,obj.sz,obj.sw,time,na);break;
      case'oak':drawOak(ox,oy,obj.sz,obj.sw,time,na);break;
      case'bush':drawBush(ox,oy+4,obj.sz,na);break;
      case'rock':drawRock(ox,oy-4,obj.sz);break;
      case'stump':drawStump(ox,oy-4);break;
      case'log':drawLog(ox,oy-4);break;
    }
  }
  if(!wDrawn)drawWolf();

  // Night overlay
  if(na>.01){const o=dc.o;ctx.fillStyle=`rgba(${~~o[0]},${~~o[1]},${~~o[2]},${o[3].toFixed(3)})`;ctx.fillRect(0,0,canvas.width,canvas.height);}

  // Estrellas
  if(na>.3){const sa=Math.min(1,(na-.3)/.4);for(let i=0;i<120;i++){const sx2=(n2(i,0,11)*canvas.width)|0,sy2=(n2(0,i,12)*canvas.height*.6)|0,tw=(Math.sin(time*1.5+i*.7)+1)/2;ctx.globalAlpha=sa*(.4+tw*.6);ctx.fillStyle='#fff';ctx.fillRect(sx2,sy2,1,1);}ctx.globalAlpha=1;}

  // Luciérnagas
  for(const p of parts){
    if(p.tp==='fly'){
      p.x+=p.vx+Math.sin(time+p.ph)*.2;p.y+=p.vy+Math.cos(time*.7+p.ph)*.15;
      if(p.x<0)p.x=mapW;if(p.x>mapW)p.x=0;if(p.y<0)p.y=mapH;if(p.y>mapH)p.y=0;
      const bl=(Math.sin(time*2+p.ph)+1)/2,al=bl*na*1.2;
      if(al>.1){const bx=p.x-camX,by=p.y-camY;if(bx>-5&&bx<canvas.width+5&&by>-5&&by<canvas.height+5){const g=ctx.createRadialGradient(bx,by,0,bx,by,6);g.addColorStop(0,`rgba(200,255,100,${al})`);g.addColorStop(1,'rgba(200,255,100,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(bx,by,6,0,Math.PI*2);ctx.fill();}}
    }else if(p.tp==='bird'){
      p.x+=p.vx;p.y+=Math.sin(time*1.5+p.ph)*.3;
      if(p.x>mapW){p.x=0;p.y=50+Math.random()*mapH*.3;}
      const bx=p.x-camX,by=p.y-camY;
      if(bx>-20&&bx<canvas.width+20&&by>-10&&by<canvas.height+10&&na<.4){
        const w=Math.sin(time*8+p.ph);ctx.strokeStyle='rgba(40,40,40,0.8)';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(bx-p.sz*2,by+w*p.sz);ctx.lineTo(bx,by);ctx.lineTo(bx+p.sz*2,by+w*p.sz);ctx.stroke();
      }
    }
  }

  // Luna
  if(na>.2){const ma=Math.min(1,(na-.2)/.4),mx2=canvas.width*.15,my2=canvas.height*.12;ctx.globalAlpha=ma*.95;ctx.fillStyle='#fffde0';ctx.beginPath();ctx.arc(mx2,my2,18,0,Math.PI*2);ctx.fill();ctx.fillStyle=`rgba(${dc.sky[0]},${dc.sky[1]},${dc.sky[2]},0.95)`;ctx.beginPath();ctx.arc(mx2+8,my2,16,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}

  // Sol
  if(na<.5){const sa=1-na*2,st=(gTime-.2)/.6,sx2=canvas.width*(.1+st*.8),sy2=canvas.height*(.35-Math.sin(st*Math.PI)*.25);ctx.globalAlpha=Math.max(0,Math.min(1,sa));const sg=ctx.createRadialGradient(sx2,sy2,0,sx2,sy2,40);sg.addColorStop(0,'rgba(255,250,200,1)');sg.addColorStop(.3,'rgba(255,220,80,0.8)');sg.addColorStop(1,'rgba(255,180,0,0)');ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sx2,sy2,40,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fffde0';ctx.beginPath();ctx.arc(sx2,sy2,14,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}

  // Dibuja banderas sobre el mundo (antes de ctx.restore)
  drawFlags();

  // Fin del mundo escalado
  ctx.restore();

  // Viñeta
  const vg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.height*.3,canvas.width/2,canvas.height/2,canvas.height*.8);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,canvas.width,canvas.height);

  // Cursor
  ctx.strokeStyle='rgba(255,220,100,0.8)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(mouseX-7,mouseY);ctx.lineTo(mouseX+7,mouseY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mouseX,mouseY-7);ctx.lineTo(mouseX,mouseY+7);ctx.stroke();

  // UI
  const h=~~(gTime*24),m=~~((gTime*24-h)*60);
  document.getElementById('tt').textContent=`${h%12===0?12:h%12}:${String(m).padStart(2,'0')} ${h>=12?'pm':'am'}`;
  document.getElementById('sun').textContent=na>.4?'🌙':na>.15?'🌅':'☀️';
  if(gTime<prevT){dayN++;if(dayN%28===0)seasN=(seasN+1)%4;}
  prevT=gTime;
  document.getElementById('dt').textContent=`${DAYS[dayN%7]} ${dayN} — ${SEAS[seasN]}`;

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ── FLAG & EVENT SYSTEM ──────────────────────────────────────

const SWATCH_COLORS = [
  '#4060e0','#e04040','#40c040','#e0b020',
  '#c040c0','#e06820','#20b8d0','#e8e8e8',
];
let selectedColor = SWATCH_COLORS[0];
let pendingTile = null;
const events = {};

// Build swatches
const swatchContainer = document.getElementById('evt-color-swatches');
SWATCH_COLORS.forEach((col, i) => {
  const sw = document.createElement('div');
  sw.className = 'swatch' + (i === 0 ? ' active' : '');
  sw.style.background = col;
  sw.dataset.color = col;
  sw.addEventListener('click', e => {
    e.stopPropagation();
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    selectedColor = col;
  });
  swatchContainer.appendChild(sw);
});

// ── Panel open/close helpers ──────────────────────────────
const evtPanel = document.getElementById('evt-panel');
const evtView  = document.getElementById('evt-view');

function closeAllPanels() {
  evtPanel.style.display = 'none';
  evtView.style.display  = 'none';
}

function openPanel(panel, x, y) {
  closeAllPanels();
  panel.style.display = 'block';
  const pw = panel.offsetWidth  || 310;
  const ph = panel.offsetHeight || 340;
  let px2 = x + 14;
  let py2 = y + 14;
  if (px2 + pw > window.innerWidth  - 10) px2 = x - pw - 14;
  if (py2 + ph > window.innerHeight - 10) py2 = Math.max(10, y - ph - 14);
  panel.style.left = px2 + 'px';
  panel.style.top  = py2 + 'px';
}

// Stop clicks inside panels from reaching canvas
evtPanel.addEventListener('click', e => e.stopPropagation());
evtView .addEventListener('click', e => e.stopPropagation());

// ── Canvas left-click ─────────────────────────────────────
canvas.addEventListener('click', e => {
  if (e.target !== canvas) return;

  const wx = (e.clientX / zoom) + camX;
  const wy = (e.clientY / zoom) + camY;
  const tc = Math.floor(wx / T);
  const tr = Math.floor(wy / T);
  const key = tr + '_' + tc;

  if (events[key]) {
    showEventView(e.clientX, e.clientY, key);
    return;
  }

  pendingTile = {r: tr, c: tc};
  const now = new Date();
  document.getElementById('evt-date').value = now.toISOString().split('T')[0];
  document.getElementById('evt-time').value = now.toTimeString().slice(0, 5);
  document.getElementById('evt-desc').value = '';
  openPanel(evtPanel, e.clientX, e.clientY);
});

// ── Panel buttons ─────────────────────────────────────────
document.getElementById('evt-close') .addEventListener('click', e => { e.stopPropagation(); closeAllPanels(); });
document.getElementById('evt-cancel').addEventListener('click', e => { e.stopPropagation(); closeAllPanels(); });

document.getElementById('evt-save').addEventListener('click', e => {
  e.stopPropagation();
  if (!pendingTile) return;
  const key = pendingTile.r + '_' + pendingTile.c;
  events[key] = {
    r:    pendingTile.r,
    c:    pendingTile.c,
    date: document.getElementById('evt-date').value,
    time: document.getElementById('evt-time').value,
    desc: document.getElementById('evt-desc').value,
    color: selectedColor,
  };
  closeAllPanels();
  pendingTile = null;
});

// ── View event ────────────────────────────────────────────
function showEventView(x, y, key) {
  const ev = events[key];
  if (!ev) return;
  document.getElementById('evt-view-name').textContent = '📌 Evento';
  document.getElementById('evt-view-date').textContent = ev.date || '—';
  document.getElementById('evt-view-time').textContent = ev.time || '—';
  document.getElementById('evt-view-desc').textContent = ev.desc || '';
  evtView._key = key;
  openPanel(evtView, x, y);
}

document.getElementById('evt-view-close') .addEventListener('click', e => { e.stopPropagation(); closeAllPanels(); });
// Score system
let diamonds = 0;
function addDiamonds(n) {
  diamonds += n;
  const el = document.getElementById('score-pts');
  el.textContent = diamonds;
  el.classList.remove('score-flash');
  void el.offsetWidth; // reflow to restart animation
  el.classList.add('score-flash');
  setTimeout(() => el.classList.remove('score-flash'), 600);
}

// Mark as done: +15 diamonds, flag turns golden
document.getElementById('evt-view-done').addEventListener('click', e => {
  e.stopPropagation();
  if (evtView._key && events[evtView._key]) {
    events[evtView._key].done = true;
    events[evtView._key].color = '#f0c020'; // golden
    addDiamonds(15);
  }
  closeAllPanels();
});

document.getElementById('evt-view-delete').addEventListener('click', e => {
  e.stopPropagation();
  if (evtView._key && events[evtView._key]) {
    // If not done yet, still reward (deleted = completed manually)
    if (!events[evtView._key].done) addDiamonds(15);
    events[evtView._key].done = true;
    events[evtView._key].color = '#f0c020'; // golden before removing
    // Short delay so player sees golden flag, then remove
    const keyToDelete = evtView._key;
    setTimeout(() => { delete events[keyToDelete]; }, 800);
  }
  closeAllPanels();
});

// ── Draggable ─────────────────────────────────────────────
function makeDraggable(panel, handle) {
  let ox=0, oy=0, dragging=false;
  handle.addEventListener('mousedown', e => {
    dragging=true; ox=e.clientX-panel.offsetLeft; oy=e.clientY-panel.offsetTop;
    e.preventDefault(); e.stopPropagation();
  });
  document.addEventListener('mousemove', e => { if(dragging){ panel.style.left=(e.clientX-ox)+'px'; panel.style.top=(e.clientY-oy)+'px'; }});
  document.addEventListener('mouseup',   () => dragging=false);
}
makeDraggable(evtPanel, document.getElementById('evt-header'));

// Escape closes panels
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeAllPanels();
});

// Space fix: only block space if not in a text input
document.addEventListener('keydown', e => {
  if (e.key === ' ' && document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
  }
}, true);

// ── DRAW FLAGS IN RENDER ──────────────────────────────────────
// Called inside render loop after world drawing, before ctx.restore()
function drawFlags() {
  for (const key in events) {
    const ev = events[key];
    const sx = ev.c * T + T/2 - camX;
    const sy = ev.r * T - camY;
    if (sx < -T*2 || sx > canvas.width/zoom + T*2) continue;
    if (sy < -T*2 || sy > canvas.height/zoom + T*2) continue;
    drawPixelFlag(sx, sy, ev.color);
  }
}

// Draw a clean single pixel-art flag on a pole
function drawPixelFlag(sx, sy, color) {
  const p = ctx;
  const isGold = (color === '#f0c020');
  const px2 = Math.floor(sx) - 1;
  const py  = Math.floor(sy) - 26;

  // Shadow
  p.fillStyle = 'rgba(0,0,0,0.18)';
  p.fillRect(px2 + 2, py + 24, 8, 3);

  // Pole — gold pole if done, brown otherwise
  p.fillStyle = isGold ? '#7a5000' : '#8b4a0a';
  p.fillRect(px2, py, 2, 26);
  p.fillStyle = isGold ? '#f0c020' : '#c87830';
  p.fillRect(px2, py, 1, 26);

  // Flag body
  p.fillStyle = color;
  p.fillRect(px2 + 2, py,      10, 7);
  p.fillStyle = shadeColor(color, -35);
  p.fillRect(px2 + 2, py + 7,  10, 2);
  p.fillStyle = shadeColor(color, 50);
  p.fillRect(px2 + 2, py,      10, 2);
  // Notch
  p.fillStyle = shadeColor(color, -50);
  p.fillRect(px2 + 10, py + 2,  2, 3);

  // Star on golden flag ✦
  if (isGold) {
    p.fillStyle = '#fff8c0';
    p.fillRect(px2 + 5, py + 1, 2, 2);  // center dot
    p.fillRect(px2 + 4, py + 2, 4, 1);  // horizontal
    p.fillRect(px2 + 5, py,     2, 5);  // vertical
  }

  // Pole cap
  p.fillStyle = isGold ? '#ffe060' : '#f0c020';
  p.fillRect(px2 - 1, py - 2, 4, 3);
}

function shadeColor(hex, amt) {
  let r = parseInt(hex.slice(1,3),16)+amt;
  let g = parseInt(hex.slice(3,5),16)+amt;
  let b = parseInt(hex.slice(5,7),16)+amt;
  r = Math.max(0,Math.min(255,r));
  g = Math.max(0,Math.min(255,g));
  b = Math.max(0,Math.min(255,b));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

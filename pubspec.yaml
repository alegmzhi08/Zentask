name: zentask
description: App zen para estudiantes universitarios.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.6.0
  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8
  table_calendar: ^3.1.3
  audioplayers: ^6.6.0
  sqflite: ^2.3.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/game/cats/spotted/
    - assets/images/game/cats/bw/
    - assets/images/game/garden/
    - assets/images/game/cats/MeowsAudio/